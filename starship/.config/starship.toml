add_newline = false

format = """
$character\
$aws\
$username\
$hostname\
$localip\
$shlvl\
$kubernetes\
$directory\
${custom.jj_bookmarks}\
${custom.jj_status}\
${custom.git_branch}\
${custom.git_commit}\
${custom.loading}\
${git_state}\
${custom.git_metrics}\
${custom.git_status}\
$hg_branch\
$package\
$buf\
$helm\
$rust\
$scala\
$terraform\
$env_var\
$sudo\
$cmd_duration\
$line_break\
$time\
$status\
$shell """

right_format = """
$python\
$jobs\
${custom.tmux}\
${custom.tmuxsessions}\
${custom.colima}\
"""

[custom.tmux]
command = """echo T"""
format = '\[[$symbol($output)]($style)\]'
shell = "sh"
when = """ test -z "$TMUX" """
style = "bold red"

[custom.tmuxsessions]
command = """tmux list-sessions | wc -l"""
format = '\[[$symbol($output)]($style)\]'
when = """ true """
shell = "sh"
style = "bold green"

[custom.colima]
disabled = true
command = """echo 🐋"""
format = '\[[$symbol($output)]($style)\]'
when = """test -e ~/.colima/docker.sock"""
shell = "sh"
style = "bold green"

[line_break]
disabled = true

[character]
disabled = false

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"

[jobs]
number_threshold = 1
symbol = ""
format = '\[[$symbol$number]($style)\]'

[aws]
disabled = false
format = '(\[[$profile]($style)\] )'

[c]
disabled = true
format = '\[[$symbol($version(-$name))]($style)\]'

[cmake]
format = '\[[$symbol($version)]($style)\]'

[cmd_duration]
disabled = true
format = '\[[$duration]($style)\]'

[cobol]
format = '\[[$symbol($version)]($style)\]'

[conda]
format = '\[[$symbol$environment]($style)\]'

[crystal]
format = '\[[$symbol($version)]($style)\]'

[daml]
format = '\[[$symbol($version)]($style)\]'

[dart]
format = '\[[$symbol($version)]($style)\]'

[deno]
format = '\[[$symbol($version)]($style)\]'

[docker_context]
format = '\[[$symbol$context]($style)\]'

[dotnet]
format = '\[[$symbol($version)(🎯 $tfm)]($style)\]'

[elixir]
format = '\[[$symbol($version \(OTP $otp_version\))]($style)\]'

[elm]
format = '\[[$symbol($version)]($style)\]'

[erlang]
format = '\[[$symbol($version)]($style)\]'

[gcloud]
format = '\[[$symbol$account(@$domain)(\($region\))]($style)\]'

[git_branch]
symbol = ""
format = '\[[$symbol$branch]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'

[custom.loading]
command = '''
  echo "..."
'''
shell = ['sh']
when = " ! test -z \"$STARSHIP_DISABLE_JJ\" "
format = '(\[[$output]($style)\])'
style = "bold purple"

[custom.jj_bookmarks]
command = '''
bookmarks=$(jj log --revisions 'heads(::@ & (bookmarks() | remote_bookmarks()))' --ignore-working-copy --no-graph --template 'bookmarks ++ "\n"')
bookmark_len=$(echo "$bookmarks" | wc -l | tr -d '[:space:]')
if [ $bookmark_len -gt 1 ]; then
  printf "$bookmark_len bookmarks"
  case "$bookmarks" in
    *"*"*) printf "*" ;;
  esac
else
  echo "$bookmarks"
fi
'''
shell = ['sh']
when = "jj --ignore-working-copy root"
format = '(\[[$output]($style)\])'
style = "bold purple"

[custom.jj_status]
command = '''
if [ "$STARSHIP_DISABLE_JJ" != "1" ]; then
  jj log --revisions @ --limit 1 --no-graph --template 'if(!empty, "+")'
fi
'''
ignore_timeout = true
shell = ['sh']
when = "jj --ignore-working-copy root"
format = '(\[[$output]($style)\])'
style = "bold red"

[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
shell = ['sh']
format = '[$output]($style)'
description = "Only show git_status if we're not in a jj repo"

[custom.git_commit]
when = "! jj --ignore-working-copy root"
command = "starship module git_commit"
shell = ['sh']
description = "Only show git_commit if we're not in a jj repo"

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
command = "starship module git_metrics"
shell = ['sh']
description = "Only show git_metrics if we're not in a jj repo"

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
shell = ['sh']
description = "Only show git_branch if we're not in a jj repo"
# $output already contains the rendered, bracketed branch; the default custom
# format ("[$symbol($output)]($style) ") would add a trailing space.
format = '[$output]($style)'

